name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DEVELOPER_DIR: /Applications/Xcode_26.2.app/Contents/Developer

jobs:
  build-and-test:
    name: macOS Swift Build & Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Versions
        run: xcodebuild -version && swift --version

      - name: Build
        run: swift build -v

      # Integration tests live in *IntegrationTests classes and hit live hosts
      # (http://httpbin.org et al.), which rate-limit under load (HTTP 503) and make CI
      # nondeterministic. CI runs the offline suite only; run the full `swift test`
      # locally for live integration coverage.
      - name: Test (offline suite)
        run: swift test -v --skip 'IntegrationTests'
