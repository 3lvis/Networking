name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DEVELOPER_DIR: /Applications/Xcode_26.2.app/Contents/Developer

jobs:
  build-and-test:
    name: macOS Swift Build & Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Versions
        run: xcodebuild -version && swift --version

      - name: Build
        run: swift build -v

      # The full suite includes integration tests that hit the live http://httpbin.org,
      # which rate-limits under load (HTTP 503) and makes CI nondeterministic. CI runs the
      # offline unit + faked-request tests only; run `swift test` locally for the live
      # httpbin integration coverage.
      - name: Test (offline suite)
        run: swift test -v --filter 'String_UTF8Tests|Dictionary_FormURLEncodedTests|JSONTests|ResultTests|ResponseTests|FakeRequestTests'
