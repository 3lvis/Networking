name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DEVELOPER_DIR: /Applications/Xcode_26.3.app/Contents/Developer

jobs:
  swift-format-check:
    name: swift-format check
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
      - name: Check formatting
        run: |
          swift format --in-place --recursive Sources Tests
          if ! git diff --exit-code; then
            echo "::error::Code is not formatted. Run: swift format --in-place --recursive Sources Tests (and commit)."
            exit 1
          fi

  build-and-test:
    name: macOS Swift Build & Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Versions
        run: xcodebuild -version && swift --version

      # Integration tests run against a local go-httpbin rather than the public
      # httpbin service (which rate-limits to HTTP 503 under load). go-httpbin is a faithful
      # native reimplementation, so tests still exercise the full real HTTP stack.
      - name: Start go-httpbin
        run: |
          mkdir -p /tmp/ghb
          curl -sSL https://github.com/mccutchen/go-httpbin/releases/download/v2.23.1/go-httpbin-darwin-all.tar.gz | tar xz -C /tmp/ghb
          /tmp/ghb/go-httpbin -port 8080 > /tmp/go-httpbin.log 2>&1 &
          for i in $(seq 1 20); do curl -sf http://127.0.0.1:8080/get >/dev/null && break; sleep 0.5; done
          curl -sf http://127.0.0.1:8080/get >/dev/null && echo "go-httpbin is up"

      - name: Build
        run: swift build -v

      - name: Test
        env:
          HTTPBIN_BASE_URL: http://127.0.0.1:8080
        run: swift test -v

  warnings:
    name: Warnings gate
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
      # No SPM cache on purpose: a fresh build recompiles everything so warnings are
      # actually re-emitted (an incremental build would skip unchanged files).
      - name: Build and fail on first-party warnings
        run: |
          set -o pipefail
          swift build --build-tests 2>&1 | tee build.log
          if grep -E "warning:" build.log | grep -vE "\.build/(checkouts|artifacts)"; then
            echo "::error::Build emitted warnings in first-party code. Fix them (the lines above)."
            exit 1
          fi

  doc-links:
    name: Doc link check
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
      - name: Check relative markdown links resolve
        run: python3 scripts/check-doc-links.py
